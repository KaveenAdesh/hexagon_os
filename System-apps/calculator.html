<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --accent: #3498db;
            --btn-bg: rgba(255, 255, 255, 0.15);
            --btn-hover: rgba(255, 255, 255, 0.25);
        }

        body {
            margin: 0;
            padding: 12px;
            width: 300px;
            height: 400px;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            color: var(--text);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(55, 55, 55, 0.6);
        }

        #display {
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 10px;
            box-sizing: border-box;
            backdrop-filter: blur(5px);
        }

        #previous-op {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            height: 15px;
        }

        #current-val {
            font-size: 28px;
            font-weight: 300;
            overflow: hidden;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            flex-grow: 1;
        }

        button {
            border: none;
            border-radius: 6px;
            background: var(--btn-bg);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            font-family: 'Orbitron', sans-serif;
        }

        button:hover {
            background: var(--btn-hover);
        }

        .operator {
            color: var(--accent);
            background: rgba(52, 152, 219, 0.15);
        }

        .equal {
            grid-column: span 2;
            background: var(--accent);
        }

        .clear {
            grid-column: span 2;
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
        }
    </style>
</head>
<body>

    <div id="display">
        <div id="previous-op"></div>
        <div id="current-val">0</div>
    </div>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">AC</button>
        <button class="operator" onclick="appendOperator('/')">÷</button>
        <button class="operator" onclick="appendOperator('*')">×</button>
        
        <button onclick="appendNumber('7')">7</button>
        <button onclick="appendNumber('8')">8</button>
        <button onclick="appendNumber('9')">9</button>
        <button class="operator" onclick="appendOperator('-')">-</button>
        
        <button onclick="appendNumber('4')">4</button>
        <button onclick="appendNumber('5')">5</button>
        <button onclick="appendNumber('6')">6</button>
        <button class="operator" onclick="appendOperator('+')">+</button>
        
        <button onclick="appendNumber('1')">1</button>
        <button onclick="appendNumber('2')">2</button>
        <button onclick="appendNumber('3')">3</button>
        <button onclick="calculate()">=</button>
        
        <button onclick="appendNumber('0')">0</button>
        <button onclick="appendNumber('.')">.</button>
        <button class="equal" onclick="calculate()">ENTER</button>
    </div>

    <script>
        let currentInput = '0';
        let previousInput = '';
        let operation = null;

        const currentDisplay = document.getElementById('current-val');
        const previousDisplay = document.getElementById('previous-op');

        function updateDisplay() {
            currentDisplay.innerText = currentInput;
            previousDisplay.innerText = previousInput + (operation || '');
        }

        function appendNumber(number) {
            if (currentInput === '0' && number !== '.') {
                currentInput = number;
            } else {
                if (number === '.' && currentInput.includes('.')) return;
                currentInput += number;
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (operation !== null) calculate();
            previousInput = currentInput;
            operation = op;
            currentInput = '0';
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '0';
            previousInput = '';
            operation = null;
            updateDisplay();
        }

        function calculate() {
            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);
            if (isNaN(prev) || isNaN(current)) return;

            switch (operation) {
                case '+': result = prev + current; break;
                case '-': result = prev - current; break;
                case '*': result = prev * current; break;
                case '/': result = (current === 0) ? 'Error' : prev / current; break;
                default: return;
            }
            currentInput = result.toString();
            operation = null;
            previousInput = '';
            updateDisplay();
        }


        
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexagonOS | Photos Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --accent: #007aff; 
            --glass: rgba(28, 28, 30, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --bg: #000000;
            --sidebar: rgba(20, 20, 22, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; }

        /* Sidebar */
        aside {
            width: 240px; background: var(--sidebar); backdrop-filter: blur(40px);
            border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 40px 15px; z-index: 10;
        }

        .section-label { font-size: 11px; font-weight: 700; color: #8e8e93; text-transform: uppercase; margin-bottom: 12px; margin-left: 10px; letter-spacing: 0.5px; }
        .nav-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; display: flex; align-items: center; gap: 12px; font-size: 14px; color: #d1d1d6; transition: 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--accent); color: white; }

        /* Main Content */
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #0a0a0a; }
        header { padding: 30px 40px 20px 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        h1 { font-size: 32px; font-weight: 700; }
        .count-tag { font-size: 14px; color: #8e8e93; }

        .content-area { flex: 1; overflow-y: auto; padding: 10px 40px 40px 40px; }

        /* Grid */
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .media-card {
            position: relative; border-radius: 14px; overflow: hidden; aspect-ratio: 16/10;
            cursor: pointer; background: #1c1c1e; transition: transform 0.3s;
        }
        .media-card:hover { transform: scale(1.02); }
        .media-card img, .media-card video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        
        /* Favorite Icon UI Fix */
        .fav-btn {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.6); border-radius: 50%;
            width: 32px; height: 32px; display: flex;
            align-items: center; justify-content: center;
            z-index: 5; transition: 0.2s;
            border: 1.5px solid rgba(255,255,255,0.3);
            font-size: 14px; color: white;
        }
        .fav-btn.active { 
            background: #ff3b30; border-color: #ff3b30; color: white;
            box-shadow: 0 0 10px rgba(255, 59, 48, 0.4);
        }

        /* Viewer Overlay */
        #viewer-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 1000; display: none; flex-direction: column;
        }

        .viewer-toolbar {
            padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }

        .viewer-controls { display: flex; gap: 15px; align-items: center; }
        .control-btn { 
            background: rgba(255,255,255,0.1); border: none; color: white; 
            padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 13px;
        }
        .control-btn:hover { background: rgba(255,255,255,0.2); }

        #display-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 20px; overflow: hidden; position: relative;
        }

        /* Improved Image Sizing */
        #main-display {
            max-width: 90vw; max-height: 80vh;
            object-fit: contain;
            transition: transform 0.2s ease-out;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        iframe { width: 80vw; height: 45vw; border-radius: 12px; }

        .btn-close { background: white; color: black; border: none; padding: 10px 24px; border-radius: 20px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<aside>
    <div class="section-label">Library</div>
    <div class="nav-item active" onclick="filterMedia('all', this)"><span>🖼️</span> Photos</div>
    <div class="nav-item" onclick="filterMedia('video', this)"><span>🎬</span> Videos</div>
    <div class="nav-item" onclick="filterMedia('fav', this)"><span>❤️</span> Favorites</div>
</aside>

<main>
    <header>
        <div>
            <h1 id="view-title">All Photos</h1>
            <div class="count-tag" id="media-count">0 items</div>
        </div>
    </header>
    <div class="content-area">
        <div class="photo-grid" id="photo-grid"></div>
    </div>
</main>

<div id="viewer-overlay">
    <div class="viewer-toolbar">
        <div id="viewer-title" style="font-weight: 600;">Untitled</div>
        <div class="viewer-controls" id="img-controls">
            <button class="control-btn" onclick="adjustZoom(0.2)">Zoom +</button>
            <button class="control-btn" onclick="adjustZoom(-0.2)">Zoom -</button>
            <button class="control-btn" onclick="rotateImg()">Rotate</button>
        </div>
        <button class="btn-close" onclick="closeViewer()">Done</button>
    </div>
    <div id="display-container"></div>
</div>

<script>
    let allMedia = [];
    let currentFilter = 'all';
    let currentZoom = 1;
    let currentRotation = 0;

    function init() {
        loadData();
    }

    function loadData() {
        allMedia = [];
        const favorites = JSON.parse(localStorage.getItem('photo-favorites') || "[]");
        const keys = Object.keys(localStorage);
        
        keys.forEach(key => {
            if(key === 'photo-favorites' || key === 'system-storage') return;
            try {
                const items = JSON.parse(localStorage.getItem(key));
                if (Array.isArray(items)) {
                    items.forEach(item => {
                        const ext = item.name.split('.').pop().toLowerCase();
                        const isVideo = ['mp4', 'webm', 'ogg'].includes(ext) || item.content.includes('youtube.com') || item.content.includes('youtu.be');
                        const isImage = ['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext);
                        if (isVideo || isImage) {
                            allMedia.push({ ...item, category: isVideo ? 'video' : 'image', isFavorite: favorites.includes(item.content) });
                        }
                    });
                }
            } catch(e){}
        });
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('photo-grid');
        grid.innerHTML = '';
        const filtered = allMedia.filter(m => currentFilter === 'all' ? true : (currentFilter === 'fav' ? m.isFavorite : m.category === currentFilter));
        document.getElementById('media-count').innerText = `${filtered.length} Items`;

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'media-card';
            let preview = item.content;
            
            if (item.content.includes('youtube.com') || item.content.includes('youtu.be')) {
                const id = item.content.split('v=')[1]?.split('&')[0] || item.content.split('/').pop();
                preview = `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
            }

            card.innerHTML = `
                <div class="fav-btn ${item.isFavorite ? 'active' : ''}" onclick="toggleFav(event, '${item.content}')">❤️</div>
                ${item.category === 'image' ? `<img src="${preview}">` : `<video src="${preview}#t=0.1" preload="metadata"></video>`}
            `;
            card.onclick = () => openInViewer(item.content, item.name, item.category);
            grid.appendChild(card);
        });
    }

    function toggleFav(e, url) {
        e.stopPropagation();
        let favs = JSON.parse(localStorage.getItem('photo-favorites') || "[]");
        if (favs.includes(url)) favs = favs.filter(f => f !== url);
        else favs.push(url);
        localStorage.setItem('photo-favorites', JSON.stringify(favs));
        loadData();
    }

    function openInViewer(url, name, type) {
        const container = document.getElementById('display-container');
        const imgControls = document.getElementById('img-controls');
        document.getElementById('viewer-title').innerText = name;
        container.innerHTML = '';
        currentZoom = 1;
        currentRotation = 0;

        const isYT = url.includes('youtube.com') || url.includes('youtu.be');
        imgControls.style.display = (type === 'image' && !isYT) ? 'flex' : 'none';

        if (isYT) {
            const id = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
            container.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
        } else if (type === 'video') {
            container.innerHTML = `<video id="main-display" src="${url}" controls autoplay></video>`;
        } else {
            container.innerHTML = `<img id="main-display" src="${url}" style="transform: scale(1) rotate(0deg)">`;
        }
        document.getElementById('viewer-overlay').style.display = 'flex';
    }

    function adjustZoom(val) {
        currentZoom = Math.max(0.5, Math.min(3, currentZoom + val));
        updateTransform();
    }

    function rotateImg() {
        currentRotation = (currentRotation + 90) % 360;
        updateTransform();
    }

    function updateTransform() {
        const el = document.getElementById('main-display');
        if(el) el.style.transform = `scale(${currentZoom}) rotate(${currentRotation}deg)`;
    }

    function closeViewer() {
        document.getElementById('viewer-overlay').style.display = 'none';
        document.getElementById('display-container').innerHTML = '';
    }

    function filterMedia(type, el) {
        currentFilter = type;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        renderGrid();
    }

    init();
</script>
</body>
</html>
